<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Task Status - EAS AI Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='bold' fill='%233b82f6'>E</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script defer src="../../js/config.js"></script>
<script defer src="../../js/auth.js"></script>
<script defer src="../../js/db.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-card: #1e293b;
  --bg-card-hover: #334155;
  --border: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #06b6d4;
  --purple: #8b5cf6;
  --radius: 12px;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  padding: 20px;
  padding: 20px env(safe-area-inset-right, 20px) 20px env(safe-area-inset-left, 20px);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.header {
  margin-bottom: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 4px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--bg-card-hover);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stat-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
}

.table-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 24px;
}

.table-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.table-header h3 {
  font-size: 16px;
  font-weight: 600;
}

.filters-bar {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.filter-select, .search-input {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 13px;
}

.search-input {
  flex: 1;
  min-width: 200px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: rgba(59, 130, 246, 0.05);
  border-bottom: 1px solid var(--border);
}

th {
  padding: 14px 16px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

tbody tr:hover {
  background: rgba(59, 130, 246, 0.02);
}

.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-approved {
  background: rgba(16, 185, 129, 0.2);
  color: var(--success);
}

.status-pending {
  background: rgba(245, 158, 11, 0.2);
  color: var(--warning);
}

.status-rejected {
  background: rgba(239, 68, 68, 0.2);
  color: var(--danger);
}

.status-ai-review {
  background: rgba(6, 182, 212, 0.2);
  color: var(--info);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.empty-state-text {
  font-size: 16px;
  margin-bottom: 8px;
}

.empty-state-subtext {
  font-size: 13px;
  color: var(--text-muted);
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.timeline {
  position: relative;
  padding: 20px;
}

.timeline-item {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  position: relative;
  padding-left: 32px;
}

.timeline-item:before {
  content: '';
  position: absolute;
  left: 4px;
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
  top: 5px;
  border: 3px solid var(--bg-primary);
}

.timeline-item:not(:last-child):after {
  content: '';
  position: absolute;
  left: 10px;
  top: 29px;
  bottom: 0;
  width: 2px;
  background: var(--border);
}

.timeline-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.timeline-time {
  font-size: 12px;
  color: var(--text-muted);
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 600px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--border);
}

.modal-close {
  float: right;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  color: var(--text-muted);
}

.modal-close:hover {
  color: var(--text-primary);
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 16px 24px;
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  max-width: 400px;
  opacity: 0;
  transform: translateY(100px);
  transition: all 0.3s ease;
  z-index: 2000;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast-success {
  border-color: var(--success);
}

.toast-error {
  border-color: var(--danger);
}

.toast-warning {
  border-color: var(--warning);
}

@media (max-width: 768px) {
  .header {
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  .stats-grid {
    grid-template-columns: 1fr;
  }

  table {
    font-size: 12px;
  }

  th, td {
    padding: 10px 12px;
  }
}

/* iPhone landscape */
@media (max-height: 500px) and (orientation: landscape) {
  .header { padding: 12px 20px; gap: 8px; }
  .stats-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
  .container { padding: 0 calc(16px + env(safe-area-inset-left, 0px)) 0 calc(16px + env(safe-area-inset-right, 0px)); }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1>📊 My Task Status</h1>
      <div class="header-subtitle">Track your submitted tasks and their approval status</div>
    </div>
    <button class="btn btn-secondary" onclick="goBackToDashboard()">← Back to Dashboard</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Submitted</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">✅ Approved</div>
      <div class="stat-value" style="color:var(--success)" id="stat-approved">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⏳ Pending</div>
      <div class="stat-value" style="color:var(--warning)" id="stat-pending">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">❌ Rejected</div>
      <div class="stat-value" style="color:var(--danger)" id="stat-rejected">0</div>
    </div>
  </div>

  <!-- Task Status Table -->
  <div class="table-card">
    <div class="table-header">
      <h3>Your Task Submissions</h3>
    </div>
    <div class="filters-bar">
      <select class="filter-select" id="status-filter" onchange="reloadTaskStatus()">
        <option value="">All Status</option>
        <option value="approved">✅ Approved</option>
        <option value="pending,ai_review,spoc_review,admin_review">⏳ Pending</option>
        <option value="rejected">❌ Rejected</option>
      </select>
      <input type="text" class="search-input" id="task-search" placeholder="Search tasks..." oninput="reloadTaskStatus()">
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Task Description</th>
            <th>Time Saved</th>
            <th>Status</th>
            <th>Pending With</th>
            <th>Submitted</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tasks-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Task Details Modal -->
<div id="task-modal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal('task-modal')">&times;</span>
    <h2>Task Details & Approval Timeline</h2>
    <div id="modal-body" style="margin-top:20px"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  let currentUserEmail = null;
  let allTasks = [];

  async function init() {
    const profile = await EAS_Auth.getUserProfile();
    if (!profile) {
      window.location.href = 'login.html';
      return;
    }
    currentUserEmail = profile.email;
    await loadTaskStatus();
  }

  async function loadTaskStatus() {
    if (!currentUserEmail) return;
    
    try {
      // Check if migration has been applied
      const profile = await EAS_Auth.getUserProfile();
      
      // Try to fetch tasks using the new approval view first
      let tasks = [];
      try {
        tasks = await EAS_DB.fetchEmployeeTaskApprovals(currentUserEmail);
      } catch (err) {
        console.warn('Approval workflow view not found - migration may not be applied:', err.message);
        
        // Fallback: Get regular tasks and try to match with approvals
        const allTasks = await EAS_DB.fetchTasks();
        tasks = (allTasks || []).filter(t => 
          (t.employee_name || '').toLowerCase() === (profile?.name || '').toLowerCase() ||
          (t.employee_email || '') === currentUserEmail
        ).map(t => ({
          task_id: t.id,
          task_description: t.task,
          time_saved: t.time_saved,
          approval_status: t.approval_status || 'pending',
          submitted_at: t.created_at,
          practice: t.practice,
          employee_name: t.employee_name,
          employee_email: t.employee_email
        }));

        if (tasks.length === 0) {
          showToast('⚠️ Approval workflow tables not yet created. Please run the SQL migration first.', 'warning');
        }
      }
      
      allTasks = tasks || [];
      updateStats();
      reloadTaskStatus();
    } catch (err) {
      console.error('Error loading tasks:', err);
      showToast('❌ Failed to load your tasks. Make sure the SQL migration has been applied.', 'error');
    }
  }

  function reloadTaskStatus() {
    const statusFilter = document.getElementById('status-filter').value;
    const search = (document.getElementById('task-search').value || '').toLowerCase();

    let filtered = allTasks;

    if (statusFilter) {
      const statuses = statusFilter.split(',');
      filtered = filtered.filter(t => statuses.includes(t.approval_status || t.status));
    }

    if (search) {
      filtered = filtered.filter(t =>
        (t.task_description || '').toLowerCase().includes(search) ||
        (t.employee_name || '').toLowerCase().includes(search)
      );
    }

    renderTasks(filtered);
  }

  function updateStats() {
    const total = allTasks.length;
    const approved = allTasks.filter(t => t.approval_status === 'approved').length;
    const rejected = allTasks.filter(t => t.approval_status === 'rejected').length;
    const pending = total - approved - rejected;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-approved').textContent = approved;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-rejected').textContent = rejected;
  }

  function renderTasks(tasks) {
    let html = '';

    if (!tasks || tasks.length === 0) {
      html = `
        <tr>
          <td colspan="6" style="text-align:center;padding:60px 20px">
            <div class="empty-state">
              <div class="empty-state-icon">📋</div>
              <div class="empty-state-text">No tasks submitted yet</div>
              <div class="empty-state-subtext">Submit your first AI task to see it here</div>
            </div>
          </td>
        </tr>
      `;
    } else {
      tasks.forEach(task => {
        const statusClass = 'status-' + (task.approval_status || task.status);
        const statusLabel = getStatusLabel(task);
        const pendingWith = getPendingWith(task);
        const submittedDate = task.submitted_at ? new Date(task.submitted_at).toLocaleDateString() : 'N/A';

        html += `<tr>
          <td>${truncate(task.task_description, 40)}</td>
          <td style="color:var(--success);font-weight:600">${task.time_saved?.toFixed(1) || 0}h</td>
          <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
          <td>${escapeHtml(pendingWith)}</td>
          <td style="font-size:12px">${submittedDate}</td>
          <td><button class="btn btn-secondary" onclick="viewTaskDetails('${task.task_id}')" style="padding:6px 12px;font-size:11px">View Timeline</button></td>
        </tr>`;
      });
    }

    document.getElementById('tasks-tbody').innerHTML = html;
  }

  function getStatusLabel(task) {
    const statusMap = {
      'approved': '✅ Approved',
      'rejected': '❌ Rejected',
      'pending': '⏳ Pending Admin',
      'ai_review': '🤖 AI Review',
      'spoc_review': '👤 SPOC Review',
      'admin_review': '⏳ Admin Review'
    };
    return statusMap[task.approval_status || task.status] || 'Pending';
  }

  function getPendingWith(task) {
    if (task.approval_status === 'approved') return '✅ Approved';
    if (task.approval_status === 'rejected') return '❌ Rejected';
    if (task.approval_status === 'ai_review') return 'AI System';
    if (task.approval_status === 'spoc_review') {
      // Show actual SPOC names from the view (pending_spoc_names column)
      if (task.pending_spoc_names) return task.pending_spoc_names;
      return 'SPOC';
    }
    if (task.approval_status === 'admin_review' || task.approval_status === 'pending') return 'Admin';
    return 'In Process';
  }

  function viewTaskDetails(taskId) {
    const task = allTasks.find(t => t.task_id === taskId);
    if (!task) return;

    const timeline = `
      <div class="timeline">
        <div class="timeline-item">
          <div>
            <div class="timeline-label">📝 Submitted</div>
            <div style="color:var(--text-primary)">${task.task_description}</div>
            <div class="timeline-time">${new Date(task.submitted_at).toLocaleString()}</div>
          </div>
        </div>
        ${task.approval_status && task.approval_status !== 'pending' ? `
        <div class="timeline-item">
          <div>
            <div class="timeline-label">${getStatusLabel(task)}</div>
            <div style="color:var(--text-primary)">Time Saved: ${task.time_saved?.toFixed(1) || 0} hours</div>
            <div class="timeline-time">${task.approved_at ? new Date(task.approved_at).toLocaleString() : 'Processing...'}</div>
          </div>
        </div>
        ` : `
        <div class="timeline-item">
          <div>
            <div class="timeline-label">⏳ In Review</div>
            <div style="color:var(--text-primary)">Pending with: ${escapeHtml(getPendingWith(task))}</div>
            <div class="timeline-time">Awaiting approval...</div>
          </div>
        </div>
        `}
      </div>
    `;

    document.getElementById('modal-body').innerHTML = timeline;
    openModal('task-modal');
  }

  function truncate(str, len) {
    return str && str.length > len ? str.substring(0, len) + '...' : str;
  }

  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function openModal(id) {
    document.getElementById(id).classList.add('active');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('active');
  }

  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast toast-' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function goBackToDashboard() {
    window.location.href = 'index.html';
  }

  // Initialize with dependency check
  async function startApp() {
    // Wait for EAS_DB to be available (from db.js)
    let attempts = 0;
    while (typeof EAS_DB === 'undefined' && attempts < 50) {
      await new Promise(resolve => setTimeout(resolve, 100));
      attempts++;
    }
    
    if (typeof EAS_DB === 'undefined') {
      console.error('Failed to load EAS_DB library');
      showToast('❌ Failed to load database library. Please refresh the page.', 'error');
      return;
    }
    
    await init();
  }

  // Start app when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startApp);
  } else {
    startApp();
  }
</script>

</body>
</html>
